{{ define "main" }}
  <div id="content-outer-container">
    <div id="content-inner-container">
      <nav class="detail-breadcrumb">
        <a href="{{ "/" | relURL }}">{{ .Params.name }}</a>
      </nav>
      <h2 class="list-title">
        {{ partial "icons/hire_me.svg" }}
        <span>{{ .Title }}</span>
      </h2>
      <div class="hire-prose">
        {{ .Content }}
      </div>

      {{ range .Params.experience }}
        <div class="resume-entry">
          <img{{ if .invertDark }} class="invert-dark"{{ end }} src="{{ printf "img/%s" .icon | relURL }}" alt="{{ .company }}">
          <div>
            <h3>{{ .company }}</h3>
            <p class="subtitle">{{ .role }}{{ with .brand }} · {{ . }}{{ end }}</p>
            <span id="date">{{ .dates }}</span>
            <ul>
              {{ range .points }}
                <li>{{ . }}</li>
              {{ end }}
            </ul>
          </div>
        </div>
      {{ end }}
    </div>
  </div>
{{ end }}
